<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Systems Studio</title>
    <meta
      name="description"
      content="React Systems Studio is a Bun-powered workspace for modern React architecture, React Router Data Mode, Better Auth, accessible UI systems, and SQLite-backed data flows."
    />
    <meta name="theme-color" content="#f8fafc" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <style>
      :root {
        color-scheme: light;
      }

      html.dark {
        color-scheme: dark;
      }

      body {
        margin: 0;
        background: #f8fafc;
        color: #1f2937;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      html.dark body {
        background: #111827;
        color: #f8fafc;
      }

      .boot-shell {
        box-sizing: border-box;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .boot-panel {
        width: min(100%, 560px);
        border: 1px solid rgba(100, 116, 139, 0.28);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.9);
        padding: 28px;
        box-shadow: 0 20px 54px -44px rgba(15, 23, 42, 0.45);
      }

      html.dark .boot-panel {
        border-color: rgba(148, 163, 184, 0.26);
        background: rgba(17, 24, 39, 0.92);
        box-shadow: 0 20px 54px -44px rgba(0, 0, 0, 0.85);
      }

      .boot-kicker {
        margin: 0 0 12px;
        color: #475569;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      html.dark .boot-kicker {
        color: #cbd5e1;
      }

      .boot-title {
        margin: 0;
        font-size: clamp(36px, 9vw, 64px);
        line-height: 1;
        letter-spacing: 0;
      }
    </style>
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("bun-react-theme");
          const theme =
            storedTheme === "light" ||
            storedTheme === "dark" ||
            storedTheme === "system"
              ? storedTheme
              : "system";
          const resolvedTheme =
            theme === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme;
          document
            .querySelector('meta[name="theme-color"]')
            ?.setAttribute(
              "content",
              resolvedTheme === "dark" ? "#101828" : "#f8fafc",
            );

          document.documentElement.classList.toggle(
            "dark",
            resolvedTheme === "dark",
          );
          const storedPreset = localStorage.getItem(
            "bun-react-theme-preset",
          );
          document.documentElement.dataset.preset =
            storedPreset === "studio" ||
            storedPreset === "ocean" ||
            storedPreset === "graphite"
              ? storedPreset
              : "studio";
          document.documentElement.dataset.theme = resolvedTheme;
          document.documentElement.style.colorScheme = resolvedTheme;
        } catch {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <main class="boot-shell" aria-label="Loading React Systems Studio">
        <section class="boot-panel">
          <p class="boot-kicker">Bun + React architecture lab</p>
          <h1 class="boot-title">Private access for the Bun + React lab.</h1>
        </section>
      </main>
    </div>
    <script type="module" src="./frontend.tsx"></script>
  </body>
</html>
