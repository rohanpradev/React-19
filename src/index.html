<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Systems Studio</title>
    <meta name="theme-color" content="#f8fafc" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("bun-react-theme");
          const theme =
            storedTheme === "light" ||
            storedTheme === "dark" ||
            storedTheme === "system"
              ? storedTheme
              : "system";
          const resolvedTheme =
            theme === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme;
          document
            .querySelector('meta[name="theme-color"]')
            ?.setAttribute(
              "content",
              resolvedTheme === "dark" ? "#101828" : "#f8fafc",
            );

          document.documentElement.classList.toggle(
            "dark",
            resolvedTheme === "dark",
          );
          const storedPreset = localStorage.getItem(
            "bun-react-theme-preset",
          );
          document.documentElement.dataset.preset =
            storedPreset === "studio" ||
            storedPreset === "ocean" ||
            storedPreset === "graphite"
              ? storedPreset
              : "studio";
          document.documentElement.dataset.theme = resolvedTheme;
          document.documentElement.style.colorScheme = resolvedTheme;
        } catch {}
      })();
    </script>
    <script type="module" src="./frontend.tsx" async></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
